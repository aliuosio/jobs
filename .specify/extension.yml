version: "1.0"
extensions:
  - name: "opencode-memory"
    type: "mcp"
    endpoint: "http://localhost:4096"
    tools:
      - memory_read_graph
      - memory_create_entities
      - memory_create_relations
      - memory_delete_entities

commands:
  - name: "speckit.implement"
    mode: "sdd-advanced"
    use_constitution: true
    memory_context: "opencode-memory"

settings:
  spec_directory: "./spec"
  template_directory: "./.specify/templates"
  outputs:
    backend: "./src"
    frontend: "./extension"