<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signal Extractor Browser Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; }
    h1, h2 { color: #333; }
    .test-form { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow-x: auto; max-height: 500px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    button { background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #1976d2; }
    #results { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Signal Extractor Browser Test</h1>
  
  <div class="test-form">
    <h2>Test Form Fields</h2>
    
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="user_email" autocomplete="email" placeholder="you@example.com" aria-describedby="email-hint">
      <span id="email-hint" class="hint">We'll use this for application updates</span>
    </div>
    
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone_number" autocomplete="tel" placeholder="+1 555-123-4567">
    </div>
    
    <div class="form-group">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="first_name" autocomplete="given-name" placeholder="John">
    </div>
    
    <div class="form-group">
      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="last_name" autocomplete="family-name" placeholder="Doe">
    </div>
    
    <div class="form-group">
      <label for="linkedin">LinkedIn URL</label>
      <input type="url" id="linkedin" name="linkedin_url" aria-label="LinkedIn Profile URL" placeholder="https://linkedin.com/in/username">
    </div>
    
    <div class="form-group">
      <label for="company">Current Company</label>
      <input type="text" id="company" name="company_name" autocomplete="organization" placeholder="Acme Inc.">
      <span class="hint">Enter your current employer</span>
    </div>
    
    <div class="form-group">
      <label for="title">Job Title</label>
      <input type="text" id="title" name="job_title" autocomplete="organization-title" placeholder="Software Engineer">
    </div>
  </div>
  
  <button id="run-tests">Run Signal Extraction Tests</button>
  
  <div id="results"></div>

  <script>
    // Inline signal extraction functions for browser testing
    const DEFAULT_MAX_LENGTH = 500;
    const HINT_CLASS_NAMES = ['hint', 'help-text', 'field-help', 'description', 'helper-text'];

    function sanitizeSignalText(text, maxLength = DEFAULT_MAX_LENGTH) {
      if (!text || typeof text !== 'string') return null;
      const sanitized = text.trim().replace(/\s+/g, ' ');
      if (!sanitized) return null;
      return sanitized.length > maxLength ? sanitized.substring(0, maxLength) : sanitized;
    }

    function extractAutocomplete(element) {
      if (!element) return null;
      return element.getAttribute('autocomplete') || null;
    }

    function extractAriaLabel(element) {
      if (!element) return null;
      const ariaLabel = element.getAttribute('aria-label');
      return ariaLabel ? sanitizeSignalText(ariaLabel) : null;
    }

    function extractPlaceholder(element) {
      if (!element) return null;
      const placeholder = element.getAttribute('placeholder');
      return placeholder ? sanitizeSignalText(placeholder) : null;
    }

    function extractHintText(element) {
      if (!element) return null;
      const describedBy = element.getAttribute('aria-describedby');
      if (describedBy) {
        const ids = describedBy.split(' ').filter(id => id.trim());
        const texts = ids.map(id => {
          const el = document.getElementById(id);
          return el ? el.textContent : null;
        }).filter(Boolean).join(' ');
        if (texts) return { text: sanitizeSignalText(texts, 1000), source: 'aria-describedby' };
      }
      
      if (element.parentElement) {
        for (const className of HINT_CLASS_NAMES) {
          const hintEl = element.parentElement.querySelector(`.${className}`);
          if (hintEl && !hintEl.contains(element)) {
            const text = sanitizeSignalText(hintEl.textContent, 1000);
            if (text) return { text, source: 'sibling-hint' };
          }
        }
      }
      return null;
    }

    function getFieldType(element) {
      if (!element) return 'unknown';
      const tagName = element.tagName?.toLowerCase();
      if (tagName === 'textarea') return 'textarea';
      if (tagName === 'select') return 'select';
      if (element.isContentEditable) return 'contenteditable';
      if (tagName === 'input') return element.type?.toLowerCase() || 'text';
      return 'unknown';
    }

    function buildFieldSignals(element, labelData) {
      if (!element) {
        return { label: null, autocomplete: null, ariaLabel: null, placeholder: null, name: null, id: null, hint: null, htmlType: 'unknown' };
      }
      return {
        label: labelData ? {
          text: sanitizeSignalText(labelData.text),
          title: labelData.element?.title || null,
          confidence: labelData.confidence || 'low',
          source: labelData.source || 'none'
        } : null,
        autocomplete: extractAutocomplete(element),
        ariaLabel: extractAriaLabel(element),
        placeholder: extractPlaceholder(element),
        name: element.name || null,
        id: element.id || null,
        hint: extractHintText(element),
        htmlType: getFieldType(element)
      };
    }

    function countSignals(signals) {
      if (!signals) return 0;
      let count = 0;
      if (signals.label?.text) count++;
      if (signals.autocomplete) count++;
      if (signals.ariaLabel) count++;
      if (signals.placeholder) count++;
      if (signals.name) count++;
      if (signals.id) count++;
      if (signals.hint?.text) count++;
      return count;
    }

    // Test runner
    document.getElementById('run-tests').addEventListener('click', () => {
      const results = [];
      let passed = 0;
      let failed = 0;

      function test(name, fn) {
        try {
          fn();
          passed++;
          results.push({ name, status: 'PASS', error: null });
        } catch (e) {
          failed++;
          results.push({ name, status: 'FAIL', error: e.message });
        }
      }

      // Run tests
      test('Email field has autocomplete="email"', () => {
        const el = document.getElementById('email');
        const signals = buildFieldSignals(el, { text: 'Email Address', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'email', `Expected 'email', got '${signals.autocomplete}'`);
      });

      test('Email field has placeholder signal', () => {
        const el = document.getElementById('email');
        const signals = buildFieldSignals(el, { text: 'Email Address', confidence: 'high', source: 'for-id' });
        console.assert(signals.placeholder === 'you@example.com', `Expected placeholder`);
      });

      test('Email field has aria-describedby hint', () => {
        const el = document.getElementById('email');
        const signals = buildFieldSignals(el, { text: 'Email Address', confidence: 'high', source: 'for-id' });
        console.assert(signals.hint?.source === 'aria-describedby', `Expected aria-describedby hint`);
        console.assert(signals.hint?.text.includes('application updates'), `Expected hint text`);
      });

      test('Phone field has autocomplete="tel"', () => {
        const el = document.getElementById('phone');
        const signals = buildFieldSignals(el, { text: 'Phone Number', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'tel', `Expected 'tel', got '${signals.autocomplete}'`);
      });

      test('First name has autocomplete="given-name"', () => {
        const el = document.getElementById('fname');
        const signals = buildFieldSignals(el, { text: 'First Name', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'given-name', `Expected 'given-name'`);
      });

      test('Last name has autocomplete="family-name"', () => {
        const el = document.getElementById('lname');
        const signals = buildFieldSignals(el, { text: 'Last Name', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'family-name', `Expected 'family-name'`);
      });

      test('LinkedIn has aria-label', () => {
        const el = document.getElementById('linkedin');
        const signals = buildFieldSignals(el, { text: 'LinkedIn URL', confidence: 'high', source: 'for-id' });
        console.assert(signals.ariaLabel === 'LinkedIn Profile URL', `Expected aria-label`);
      });

      test('Company has autocomplete="organization"', () => {
        const el = document.getElementById('company');
        const signals = buildFieldSignals(el, { text: 'Current Company', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'organization', `Expected 'organization'`);
      });

      test('Job title has autocomplete="organization-title"', () => {
        const el = document.getElementById('title');
        const signals = buildFieldSignals(el, { text: 'Job Title', confidence: 'high', source: 'for-id' });
        console.assert(signals.autocomplete === 'organization-title', `Expected 'organization-title'`);
      });

      test('All fields have at least 3 signals', () => {
        const fields = ['email', 'phone', 'fname', 'lname', 'linkedin', 'company', 'title'];
        fields.forEach(id => {
          const el = document.getElementById(id);
          const signals = buildFieldSignals(el, { text: el.previousElementSibling?.textContent, confidence: 'high', source: 'for-id' });
          const count = countSignals(signals);
          console.assert(count >= 3, `${id} has only ${count} signals`);
        });
      });

      // Display results
      const resultsHtml = `
        <h2>Test Results</h2>
        <p><span class="${failed === 0 ? 'pass' : 'fail'}">${passed} passed, ${failed} failed</span></p>
        <pre>${results.map(r => 
          `${r.status === 'PASS' ? '✓' : '✗'} ${r.name}${r.error ? '\n  Error: ' + r.error : ''}`
        ).join('\n')}</pre>
        
        <h2>Sample Signal Data</h2>
        <pre>${JSON.stringify(
          buildFieldSignals(
            document.getElementById('email'), 
            { text: 'Email Address', confidence: 'high', source: 'for-id' }
          ), 
          null, 2
        )}</pre>
      `;
      
      document.getElementById('results').innerHTML = resultsHtml;
    });
  </script>
</body>
</html>
