volumes:
  n8n_data:
  postgres_data:

networks:
  ${NAMESPACE}:

services:
  n8n:
    image: n8nio/n8n:${N8N_VERSION}
    hostname: n8n
    container_name: ${NAMESPACE}_n8n
    user: "${UID}:${GID}"
    pull_policy: always
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:${MAIN_WORKDIR}
      - ./.prompts:/home/node/.n8n-files/Prompts/jobs
      - ./.shared/:/home/node/.n8n-files/.shared
      - ./n8n-workflows:/home/node/import:ro
    entrypoint: >
      sh -c 
      "
        if [ ! -f /home/node/.n8n/.imported ]; then
          n8n import:workflow --separate --input=/home/node/import &&
          touch /home/node/.n8n/.imported
        fi &&
        n8n start
      "
    ports:
      - 5678:5678
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-runners:
    image: n8nio/runners:${N8N_RUNNER_VERSION}
    container_name: ${NAMESPACE}_task-runners
    pull_policy: always
    env_file:
      - .env
    depends_on:
      n8n:
        condition: service_started

  postgres:
    container_name: ${NAMESPACE}_postgres
    image: postgres:${POSTGRES_VERSION}
    pull_policy: always
    env_file:
      - .env
    hostname: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./.docker/postgres/init-scripts:/docker-entrypoint-initdb.d/

  redis:
    container_name: ${NAMESPACE}_redis
    image: redis:${REDIS_VERSION}
    pull_policy: always
    env_file:
      - .env
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    expose:
      - 6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: >
      redis-server --port 6379 --appendonly no --maxmemory 2GB --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2GB
        reservations:
          cpus: '2.0'
          memory: 2GB

  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION}
    pull_policy: always
    hostname: qdrant
    container_name: ${NAMESPACE}_qdrant
    env_file:
      - .env
    ports:
      - 6333:6333
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-backend:
    image: osioaliu/job-api-backend:latest
    pull_policy: always
    container_name: ${NAMESPACE}_api-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    pull_policy: always 
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"