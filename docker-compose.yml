
services:

  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - rag-network

  api-backend:
    build: .
    container_name: api-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant-db
      - QDRANT_PORT=6333
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_BASE_URL=${ZAI_BASE_URL}
    depends_on:
      - qdrant-db
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
